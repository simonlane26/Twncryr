[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.cronJobs]]
name = "expire-posts"
schedule = "*/5 * * * *"
command = "curl -s -H \"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/expire-posts"

[[deploy.cronJobs]]
name = "weekly-digest"
schedule = "0 8 * * 1"
command = "curl -s -H \"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/weekly-digest"

[[deploy.cronJobs]]
name = "check-thresholds"
schedule = "0 * * * *"
command = "curl -s -H \"Authorization: Bearer $CRON_SECRET\" http://localhost:3000/api/cron/check-thresholds"
